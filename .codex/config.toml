# PersonalDealIntelligence Codex configuration

model = "gpt-5.5-thinking"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[project]
name = "PersonalDealIntelligence"
description = "Local-first banking promotion intelligence with RepoOS-style AgentOps infrastructure."

[context]
read_first = [
  "AGENTS.md",
  "docs/issue-map.md",
  "docs/verification.md",
  "docs/architecture/banking-mvp.md",
  "docs/decisions.md",
  "MEMORY.md",
  "docs/agentops/README.md"
]
avoid_by_default = [
  ".env",
  ".env.*",
  "secrets/**",
  "credentials/**",
  "node_modules/**",
  "dist/**",
  "build/**",
  ".venv/**",
  "data/**",
  "*.sqlite",
  "*.db"
]

[workflow]
require_plan_for_large_changes = true
require_verification_summary = true
require_pr_after_implementation = true
prefer_small_diffs = true

[agentops]
improvement_backlog = "docs/agentops/improvement-backlog.md"
harness_scorecard = "docs/agentops/harness-scorecard.md"
legibility_scorecard = "docs/agentops/agent-legibility-scorecard.md"
