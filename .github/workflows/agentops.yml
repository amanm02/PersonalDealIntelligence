name: AgentOps

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * 1"

jobs:
  agentops:
    # Organization-level self-hosted runner from amanm02.
    # Expected labels: self-hosted, macOS, ARM64.
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
      - name: Confirm runner Python
        run: python3 --version
      - name: Install dev dependencies
        run: python3 -m pip install -e '.[dev]'
      - name: Run AgentOps test suite
        run: make agentops-test
